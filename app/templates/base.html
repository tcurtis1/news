<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }} · Yoyosup News</title>
  <meta name="description" content="Daily Intersection (mass attention) and Curious Pulse on yoyosup.com." />
  <link rel="stylesheet" href="/static/style.css?v=0.5.1" />
  <link rel="canonical" href="{{ public_base }}{{ request.url.path }}" />
</head>
<body>
  <div class="wrap">
    <header class="site">
      <div class="brand">
        <strong>Yoyo<span>sup</span> News</strong>
        <span class="tag">Intersection · curious pulse</span>
      </div>
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Pulse</a>
        <a href="/search" class="{% if request.url.path.startswith('/search') %}active{% endif %}">Intersection</a>
        <a href="https://www.yoyosup.com/tools/" rel="noopener">Tools</a>
      </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site">
      <span>Part of <a href="https://www.yoyosup.com/">yoyosup.com</a></span>
      <span><a href="/api/pulse">JSON API</a> · MVP</span>
    </footer>
  </div>
</body>
</html>
